<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>German Flashcards Pro (Cloud)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        /* --- Auth Navbar --- */
        .auth-nav {
            width: 100%;
            background: #2c3e50;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .auth-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .auth-btn:hover { background: #2980b9; }
        .auth-btn.logout { background: #e74c3c; }
        .auth-btn.logout:hover { background: #c0392b; }

        #user-info { font-size: 0.9rem; font-weight: 500; }

        /* --- Stats Navbar --- */
        .stats-nav {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .stat-btn {
            background: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-btn:active { transform: scale(0.95); }
        .stat-btn.weak { color: #e74c3c; }
        .stat-btn.known { color: #2ecc71; }
        
        .badge {
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
            color: #333;
        }

        /* --- Card Container --- */
        #main-app-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            display: none; /* Hidden until logged in */
        }

        #login-prompt {
            margin-top: 40px;
            font-size: 1.2rem;
            color: #555;
            text-align: center;
        }

        #card-container {
            perspective: 1000px;
            width: 85%;
            max-width: 400px;
            height: 55%;
            position: relative;
            margin-top: 10px;
        }

        #card {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 20px;
            cursor: grab;
        }

        #card:active { cursor: grabbing; }
        #card.flipped { transform: rotateX(180deg); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
            user-select: none;
        }

        .front { background-color: white; color: #2c3e50; }
        .back { background-color: #3498db; color: white; transform: rotateX(180deg); }

        .word-type {
            font-size: 1rem;
            color: #eee;
            position: absolute;
            top: 20px;
            font-weight: normal;
        }

        .instructions {
            margin-top: auto;
            margin-bottom: 30px;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.6;
        }

        /* --- Animations --- */
        .fly-left {
            transform: translateX(-150%) rotate(-30deg) !important;
            opacity: 0;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
        }

        .fly-right {
            transform: translateX(150%) rotate(30deg) !important;
            opacity: 0;
            transition: transform 0.4s ease-out, opacity 0.4s ease-out;
        }

        /* --- Modals for Word Lists --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal.show { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .modal-header h2 { margin: 0; font-size: 1.5rem; color: #333; }
        .close-btn { background: none; border: none; font-size: 2rem; cursor: pointer; color: #888; }
        .word-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; }
        .word-list li { padding: 12px 0; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 1.1rem; }
        .word-list li .de { font-weight: bold; color: #2c3e50; }
        .word-list li .en { color: #888; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="auth-nav">
        <span id="user-info">German Flashcards Pro</span>
        <div>
            <button id="login-btn" class="auth-btn" onclick="signIn()">Login with Google</button>
            <button id="logout-btn" class="auth-btn logout" style="display:none;" onclick="signOut()">Logout</button>
        </div>
    </div>

    <div id="login-prompt">
        Please log in to load your personalized flashcards.
    </div>

    <div id="main-app-content">
        <div class="stats-nav">
            <button class="stat-btn weak" onclick="openModal('weak')">
                Weak <span class="badge" id="badge-weak">0</span>
            </button>
            <button class="stat-btn known" onclick="openModal('known')">
                Known <span class="badge" id="badge-known">0</span>
            </button>
        </div>

        <div id="card-container">
            <div id="card">
                <div class="face front" id="front-text">Loading Data...</div>
                <div class="face back">
                    <span class="word-type">Translation</span>
                    <span id="back-text">...</span>
                </div>
            </div>
        </div>

        <div class="instructions">
            <strong>Swipe Up / Tap</strong> to reveal translation<br>
            <strong>Swipe Left</strong> to add to Weak Pile<br>
            <strong>Swipe Right</strong> to add to Known Pile
        </div>
    </div>

    <div id="word-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Word List</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <ul id="modal-list" class="word-list"></ul>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION (PASTE YOURS HERE)
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyDLuU96NZ-4I5PqUnpO0fPuM9z4BJnvX_M",
          authDomain: "lingoflashcards.firebaseapp.com",
          projectId: "lingoflashcards",
          storageBucket: "lingoflashcards.firebasestorage.app",
          messagingSenderId: "966379837552",
          appId: "1:966379837552:web:fc5f7db1b8329d09f4fcb5",
          measurementId: "G-JZZ03GQ2ZV"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Global State
        let currentUser = null;
        let cloudWeights = {}; // Replaces localStorage
        let flashcards = [];
        let currentCard = null;

        // UI Elements
        const card = document.getElementById('card');
        const frontText = document.getElementById('front-text');
        const backText = document.getElementById('back-text');
        const badgeWeak = document.getElementById('badge-weak');
        const badgeKnown = document.getElementById('badge-known');
        const mainAppContent = document.getElementById('main-app-content');
        const loginPrompt = document.getElementById('login-prompt');
        const userInfo = document.getElementById('user-info');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const modal = document.getElementById('word-modal');
        const modalList = document.getElementById('modal-list');
        const modalTitle = document.getElementById('modal-title');

        let isDragging = false;
        let startX = 0, startY = 0, currentX = 0, currentY = 0;
        let isFlipped = false;

        // ==========================================
        // 2. AUTHENTICATION LOGIC
        // ==========================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // User is logged in
                currentUser = user;
                userInfo.textContent = `Hi, ${user.displayName.split(' ')[0]}`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                loginPrompt.style.display = 'none';
                mainAppContent.style.display = 'flex';

                await loadUserProgress(); // Fetch their weights from cloud
                loadWordsFromFile();      // Then load the global text file
            } else {
                // User is logged out
                currentUser = null;
                flashcards = [];
                cloudWeights = {};
                userInfo.textContent = "German Flashcards Pro";
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                loginPrompt.style.display = 'block';
                mainAppContent.style.display = 'none';
            }
        });

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(error => alert(error.message));
        }

        function signOut() {
            auth.signOut();
        }

        // ==========================================
        // 3. FIRESTORE DATABASE LOGIC
        // ==========================================
        async function loadUserProgress() {
            if (!currentUser) return;
            try {
                const docRef = db.collection('users').doc(currentUser.uid);
                const docSnap = await docRef.get();
                
                if (docSnap.exists) {
                    cloudWeights = docSnap.data().weights || {};
                } else {
                    cloudWeights = {}; // First time user
                }
            } catch (error) {
                console.error("Error fetching progress:", error);
            }
        }

        // Optimized save: we only update the specific word swiped in the database
        async function saveProgress(word, newWeight) {
            if (!currentUser) return;
            
            try {
                // Uses dot notation to update just one specific word in the weights map
                await db.collection('users').doc(currentUser.uid).set({
                    weights: {
                        [word]: newWeight
                    }
                }, { merge: true });
                
                updateUIStats();
            } catch (error) {
                console.error("Error saving progress:", error);
            }
        }

        // ==========================================
        // 4. APP LOGIC (Parsing & Swiping)
        // ==========================================
        async function loadWordsFromFile() {
            try {
                const response = await fetch('words.txt'); 
                if (!response.ok) throw new Error('Network ok');
                const text = await response.text();
                parseTextData(text);
            } catch (error) {
                frontText.textContent = "Error loading words.txt";
                frontText.style.fontSize = "1.5rem";
            }
        }

        function parseTextData(text) {
            flashcards = []; 
            const lines = text.split(/\r?\n/);
            
            for (let i = 0; i < lines.length; i += 3) {
                let deWord = lines[i] ? lines[i].trim() : '';
                let enWord = lines[i+1] ? lines[i+1].trim() : '';
                deWord = deWord.replace(/\\s*/g, '');
                
                if (deWord && enWord) {
                    // Check cloudWeights instead of localStorage
                    const weight = cloudWeights[deWord] !== undefined ? cloudWeights[deWord] : 10;
                    flashcards.push({ de: deWord, en: enWord, weight: weight });
                }
            }

            if (flashcards.length > 0) {
                updateUIStats();
                loadNextCard();
            }
        }

        function updateUIStats() {
            const weakCount = flashcards.filter(c => c.weight >= 15).length;
            const knownCount = flashcards.filter(c => c.weight <= 5).length;
            badgeWeak.textContent = weakCount;
            badgeKnown.textContent = knownCount;
        }

        function loadNextCard() {
            card.classList.remove('fly-left', 'fly-right', 'flipped');
            card.style.transition = 'none';
            card.style.transform = '';
            isFlipped = false;

            const totalWeight = flashcards.reduce((sum, card) => sum + card.weight, 0);
            let random = Math.random() * totalWeight;
            
            let sum = 0;
            for (let item of flashcards) {
                sum += item.weight;
                if (random <= sum) {
                    currentCard = item;
                    break;
                }
            }

            setTimeout(() => {
                frontText.textContent = currentCard.de;
                backText.textContent = currentCard.en;
            }, 100); 
        }

        // --- Swipe Logic ---
        card.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            card.style.transition = 'none';
            card.setPointerCapture(e.pointerId);
        });

        card.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            currentX = e.clientX - startX;
            currentY = e.clientY - startY;
            const rotate = currentX * 0.05; 
            
            if (isFlipped) {
                card.style.transform = `translate(${currentX}px, ${currentY}px) rotateX(180deg) rotateZ(${rotate}deg)`;
            } else {
                card.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotate}deg)`;
            }
        });

        card.addEventListener('pointerup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = 'transform 0.4s ease';
            card.releasePointerCapture(e.pointerId);

            const thresholdX = 100;
            const thresholdY = -80;

            if (Math.abs(currentX) > Math.abs(currentY)) {
                if (currentX > thresholdX) {
                    // Swipe Right (Decrease weight by 3, min 1)
                    currentCard.weight = Math.max(1, currentCard.weight - 3);
                    saveProgress(currentCard.de, currentCard.weight); // Cloud save
                    card.classList.add('fly-right');
                    setTimeout(loadNextCard, 300);
                } else if (currentX < -thresholdX) {
                    // Swipe Left (Increase weight by 5)
                    currentCard.weight += 5;
                    saveProgress(currentCard.de, currentCard.weight); // Cloud save
                    card.classList.add('fly-left');
                    setTimeout(loadNextCard, 300);
                } else {
                    resetCardPosition();
                }
            } else {
                if (currentY < thresholdY) {
                    toggleFlip();
                    resetCardPosition();
                } else if (Math.abs(currentX) < 10 && Math.abs(currentY) < 10) {
                    toggleFlip();
                } else {
                    resetCardPosition();
                }
            }
            currentX = 0;
            currentY = 0;
        });

        function toggleFlip() {
            isFlipped = !isFlipped;
            isFlipped ? card.classList.add('flipped') : card.classList.remove('flipped');
        }

        function resetCardPosition() {
            card.style.transform = isFlipped ? 'rotateX(180deg)' : 'translate(0px, 0px) rotate(0deg)';
        }

        // ==========================================
        // 5. MODAL LOGIC
        // ==========================================
        function openModal(type) {
            modalList.innerHTML = '';
            let filteredCards = [];

            if (type === 'weak') {
                modalTitle.textContent = "Weak Words";
                modalTitle.style.color = "#e74c3c";
                filteredCards = flashcards.filter(c => c.weight >= 15).sort((a,b) => b.weight - a.weight);
            } else {
                modalTitle.textContent = "Known Words";
                modalTitle.style.color = "#2ecc71";
                filteredCards = flashcards.filter(c => c.weight <= 5).sort((a,b) => a.weight - b.weight);
            }

            if (filteredCards.length === 0) {
                modalList.innerHTML = `<li style="justify-content:center; color:#888;">No words in this pile yet!</li>`;
            } else {
                filteredCards.forEach(card => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="de">${card.de}</span> <span class="en">${card.en}</span>`;
                    modalList.appendChild(li);
                });
            }
            modal.classList.add('show');
        }

        function closeModal() { modal.classList.remove('show'); }
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

    </script>
</body>
</html>
